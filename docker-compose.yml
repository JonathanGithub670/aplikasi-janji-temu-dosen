# ============================================
# Docker Compose - Aplikasi Janji Temu Dosen
# Services: App (PHP-FPM), Nginx, MySQL, Redis
# ============================================

services:
  # ---- PHP-FPM Application ----
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: reservasi-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - reservasi-network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ---- Nginx Web Server ----
  webserver:
    image: nginx:alpine
    container_name: reservasi-webserver
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - reservasi-network
    depends_on:
      - app

  # ---- MySQL Database ----
  db:
    image: mysql:8.0
    container_name: reservasi-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: db_topsis
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_USER: reservasi_user
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_HOST: "%"
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - reservasi-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-psecret"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---- Redis Cache/Session/Queue ----
  redis:
    image: redis:7-alpine
    container_name: reservasi-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    networks:
      - reservasi-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

# ---- Named Volumes ----
volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

# ---- Networks ----
networks:
  reservasi-network:
    driver: bridge
